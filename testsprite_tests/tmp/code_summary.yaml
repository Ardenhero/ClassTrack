version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js (App Router)
  - TailwindCSS
  - Framer Motion
  - Supabase (Backend/Auth)
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Landing page or root entry point
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Administrator and Instructor login page
  - path: /student/portal
    file: src/app/student/portal/page.tsx
    auth_required: false
    description: Student portal accessible via SIN
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Main dashboard for instructors and admins
  - path: /classes
    file: src/app/classes/page.tsx
    auth_required: true
    description: Class management and overview
  - path: /students
    file: src/app/students/page.tsx
    auth_required: true
    description: Student directory and records
  - path: /attendance
    file: src/app/attendance/page.tsx
    auth_required: true
    description: Attendance logs and monitoring
  - path: /settings
    file: src/app/settings/page.tsx
    auth_required: true
    description: Application settings and profile management
features:
  - name: Student Login
    description: Access the student portal using a Student Identification Number (SIN)
    files:
      - src/app/student/portal/page.tsx
    entry_route: /student/portal
    user_interactions:
      - Enter SIN "22-00555" in the input field
      - Click Submit or Enter to access the portal
    auth_required: false
  - name: Admin/Instructor Login
    description: Authenticate using email and password
    files:
      - src/app/login/page.tsx
    entry_route: /login
    user_interactions:
      - Enter email "adminme@engineering.edu"
      - Enter password "adminme123"
      - Click Login button
    auth_required: false
  - name: Attendance Tracking
    description: View and manage attendance records
    files:
      - src/app/attendance/page.tsx
      - src/components/AttendanceTable.tsx
    entry_route: /attendance
    user_interactions:
      - Filter attendance by date
      - Search for a specific student
    auth_required: true
  - name: Class Management
    description: Instructors can manage their classes
    files:
      - src/app/classes/page.tsx
    entry_route: /classes
    user_interactions:
      - View list of classes
      - Click on a class to see details
    auth_required: true
known_limitations: []
